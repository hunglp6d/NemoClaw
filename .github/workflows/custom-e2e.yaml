name: custom-e2e

on:
  push:
    branches: [fix/nightly-e2e-destroy-grpc-retry-118541a-custom-e2e]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: custom-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployment-services-e2e:
    if: github.repository == 'hunglp6d/NemoClaw'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run deployment services E2E test
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NEMOCLAW_NON_INTERACTIVE: "1"
          NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
          NEMOCLAW_SANDBOX_NAME: "e2e-deploy-svc"
        run: bash test/e2e/test-deployment-services.sh

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-services-test-log
          path: test-deployment-services-*.log
          if-no-files-found: ignore

name: custom-e2e

on:
  push:
    branches: [fix/nightly-e2e-router-submodule-not-init-e2e36d9-custom-e2e]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: custom-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-validation-e2e:
    if: github.repository == 'hunglp6d/NemoClaw'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install NemoClaw
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NEMOCLAW_NON_INTERACTIVE: "1"
          NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
        run: bash install.sh --non-interactive --yes-i-accept-third-party-software

      - name: Run docs validation
        env:
          CHECK_DOC_LINKS_REMOTE: "0"
        run: |
          set -euo pipefail
          [ -f "$HOME/.bashrc" ] && source "$HOME/.bashrc" 2>/dev/null || true
          export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          [ -d "$HOME/.local/bin" ] && [[ ":$PATH:" != *":$HOME/.local/bin:"* ]] && export PATH="$HOME/.local/bin:$PATH"
          bash test/e2e/test-docs-validation.sh

#
# Validation workflow for fix/nightly-e2e-brev-needs-startup-failure-a2e251d.
#
# Purpose: Confirm that the nightly-e2e workflow can start after removing
# brev-e2e from aggregation needs arrays.  A startup_failure on the
# original nightly prevented ALL jobs from being created; this workflow
# replicates the aggregation-needs pattern from the fixed nightly to
# prove the parser no longer chokes.  It runs only the lightest canary
# jobs (checkout + true) because the fix is a YAML-level parse fix, not
# a test-logic change.

name: custom-e2e

on:
  push:
    branches: [fix/nightly-e2e-brev-needs-startup-failure-a2e251d-custom-e2e]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: custom-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Canary E2E jobs (lightweight proxies for the real jobs) ──────
  # These exist solely to populate the needs array of the aggregation
  # job below, mimicking the nightly-e2e dependency fan-out.
  canary-cloud-e2e:
    if: github.repository == 'hunglp6d/NemoClaw'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: echo "canary-cloud-e2e passed"

  canary-messaging-e2e:
    if: github.repository == 'hunglp6d/NemoClaw'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: echo "canary-messaging-e2e passed"

  canary-sandbox-e2e:
    if: github.repository == 'hunglp6d/NemoClaw'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: echo "canary-sandbox-e2e passed"

  # ── brev-e2e (reusable workflow + matrix — kept but NOT in needs) ─
  # This job is present to prove the workflow parses with the reusable
  # matrix call in the same file.  It is deliberately excluded from
  # the aggregation needs below — matching the fix.
  brev-e2e:
    if: >-
      github.repository == 'hunglp6d/NemoClaw' &&
      false
    strategy:
      fail-fast: false
      matrix:
        test_suite: [all, messaging-providers, full]
    uses: ./.github/workflows/e2e-branch-validation.yaml
    with:
      branch: ${{ github.ref_name }}
      test_suite: ${{ matrix.test_suite }}
      use_launchable: true
      use_published_launchable: true
      launchable_id: ""
      keep_alive: false
    secrets:
      BREV_API_KEY: ${{ secrets.BREV_API_KEY }}
      BREV_ORG_ID: ${{ secrets.BREV_ORG_ID }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

  # ── Aggregation (mirrors notify-on-failure pattern) ──────────────
  # This job's needs array deliberately excludes brev-e2e, matching
  # the fix applied to nightly-e2e.yaml.  If the workflow starts and
  # this job runs, the fix is validated.
  aggregation-check:
    runs-on: ubuntu-latest
    needs:
      [
        canary-cloud-e2e,
        canary-messaging-e2e,
        canary-sandbox-e2e,
        # brev-e2e excluded — this is the fix under test.
      ]
    if: ${{ always() }}
    steps:
      - name: Summarize results
        run: |
          echo "=== custom-e2e validation ==="
          echo "All canary jobs completed — workflow parser accepted the file."
          echo "Fix validated: brev-e2e excluded from aggregation needs."
          echo "Conclusion: startup_failure resolved."

name: custom-e2e

on:
  push:
    branches: [fix/nightly-e2e-net-policy-inference-retry-c4b608a-custom-e2e]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: custom-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  network-policy-e2e:
    if: github.repository == 'hunglp6d/NemoClaw'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run network policy E2E test
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NEMOCLAW_NON_INTERACTIVE: "1"
          NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE: "1"
          NEMOCLAW_POLICY_TIER: "restricted"
          NEMOCLAW_RECREATE_SANDBOX: "1"
        run: bash test/e2e/test-network-policy.sh

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: network-policy-test-log
          path: test-network-policy-*.log
          if-no-files-found: ignore

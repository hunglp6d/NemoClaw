#
# Validation workflow for fix/nightly-e2e-brev-needs-startup-failure-a2e251d (attempt 2).
#
# Purpose: Minimal canary to confirm the workflow parser does NOT hit
# startup_failure when the brev-e2e reusable-workflow matrix job is
# absent from the file entirely.

name: custom-e2e

on:
  push:
    branches: [fix/nightly-e2e-brev-needs-startup-failure-a2e251d-attempt-2-custom-e2e]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    if: github.repository == 'hunglp6d/NemoClaw'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: echo "canary passed — no startup_failure"

  aggregation-check:
    runs-on: ubuntu-latest
    needs: [canary]
    if: ${{ always() }}
    steps:
      - run: |
          echo "Aggregation job ran — parser accepted the workflow."
          echo "No brev-e2e job present => no startup_failure."
